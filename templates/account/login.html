<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Вход в систему</title>
    <style>
        body {
            background: #1a1a1a;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .auth-card {
            background: rgba(0, 0, 0, 0.85);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 350px;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #ccc;
        }

        /* Поля ввода и селектор выбора роли */
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: white;
            box-sizing: border-box;
            font-size: 14px;
        }

        .form-group input::placeholder {
            color: #666;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #007bff;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            font-size: 16px;
        }

        .btn-submit:hover {
            background: #0056b3;
        }

        .auth-footer {
            margin-top: 15px;
            text-align: center;
            font-size: 13px;
        }

        .auth-footer a {
            color: #007bff;
            text-decoration: none;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .error-list {
            color: #ff6b6b;
            font-size: 13px;
            margin-bottom: 15px;
            padding-left: 20px;
        }
    </style>
</head>

<body>
    <div class="auth-card">
        <h2>Войти</h2>

        <form method="POST" action="{% url 'account_login' %}">
            {% csrf_token %}

            {% if form.non_field_errors %}
            <ul class="error-list">
                {% for error in form.non_field_errors %}
                <li>{{ error }}</li>
                {% endfor %}
            </ul>
            {% endif %}

            {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <small style="color: #ff6b6b; display: block; margin-top: 2px;">{{ field.errors.0 }}</small>
                {% endif %}
            </div>
            {% endfor %}

            <button type="submit" class="btn-submit">Войти</button>
        </form>

        <div class="auth-footer">
            <span style="color: #888;">Нет аккаунта?</span>
            <a href="{% url 'account_signup' %}">Регистрация</a>
        </div>
    </div>
</body>

</html>
